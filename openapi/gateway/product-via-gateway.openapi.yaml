openapi: 3.0.3
info:
  title: sacom product APIs via gateway
  version: 1.1.0
servers:
  - url: http://localhost:4000
paths:
  /products:
    get:
      summary: Storefront product list
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: facet.material.fabric
          schema: { type: string }
        - in: query
          name: facet.material.weave
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: number }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: discountType
          schema: { type: string, enum: [none, percent, flat] }
        - in: query
          name: discountMin
          schema: { type: number }
        - in: query
          name: discountMax
          schema: { type: number }
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
  /products/facets:
    get:
      summary: Storefront facet metadata
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        '200':
          description: Facet list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductFacetResponse'
  /products/{slug}:
    parameters:
      - in: path
        name: slug
        required: true
        schema: { type: string }
    get:
      summary: Storefront product detail
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
  /categories/{slug}/products:
    parameters:
      - in: path
        name: slug
        required: true
        schema: { type: string }
    get:
      summary: Storefront products by category slug
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
  /api/admin/products:
    get:
      summary: List admin products
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: facet.material.fabric
          schema: { type: string }
        - in: query
          name: facet.material.weave
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: number }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: discountType
          schema: { type: string, enum: [none, percent, flat] }
        - in: query
          name: discountMin
          schema: { type: number }
        - in: query
          name: discountMax
          schema: { type: number }
      responses:
        '200': { description: Product list }
    post:
      summary: Create product
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWriteRequest'
      responses:
        '201': { description: Created }
  /api/admin/products/facets:
    get:
      summary: Admin facet metadata
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        '200':
          description: Facet list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductFacetResponse'
  /api/admin/products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get product
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Product }
    put:
      summary: Update product
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWriteRequest'
      responses:
        '200': { description: Updated }
    delete:
      summary: Delete product
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deleted }
  /api/admin/products/{id}/publish:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    patch:
      summary: Publish/unpublish
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Updated }
  /api/admin/products/{id}/variants:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: List variants
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Variant list }
    post:
      summary: Create variant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VariantWriteRequest'
      responses:
        '201': { description: Created }
  /api/admin/products/{id}/variants/{variantId}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
      - in: path
        name: variantId
        required: true
        schema: { type: string }
    patch:
      summary: Update variant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VariantWriteRequest'
      responses:
        '200': { description: Updated }
  /api/admin/products/inventory/list:
    get:
      summary: List inventory
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: productId
          schema: { type: string }
        - in: query
          name: variantId
          schema: { type: string }
        - in: query
          name: sizeLabel
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
          description: Case-insensitive match against stock key, size label, product title, and product slug.
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Paginated inventory list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
                  totalPages: { type: integer }
  /api/admin/products/inventory/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    patch:
      summary: Update inventory
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryPatchRequest'
      responses:
        '200': { description: Updated }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ColorSummary:
      type: object
      properties:
        colorNames:
          type: array
          items: { type: string }
        swatches:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              hex: { type: string }
        hasMultipleColors: { type: boolean }
    Discount:
      type: object
      properties:
        type: { type: string, enum: [none, percent, flat] }
        value: { type: number }
        label: { type: string }
    ProductWriteRequest:
      type: object
      properties:
        title: { type: string }
        slug: { type: string }
        categoryId: { type: string }
        tags:
          type: array
          items: { type: string }
        currency: { type: string }
        shipping:
          type: object
          properties:
            text: { type: string }
        care:
          type: object
          properties:
            text: { type: string }
        returnPolicy:
          type: object
          properties:
            text: { type: string }
            returnable: { type: boolean }
            windowDays: { type: number }
        details: { type: object }
    ProductListItem:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        slug: { type: string }
        minPrice: { type: number, nullable: true }
        maxPrice: { type: number, nullable: true }
        availability: { type: boolean }
        colorSummary:
          $ref: '#/components/schemas/ColorSummary'
        otherVariantColors:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              hex: { type: string }
        defaultVariant:
          type: object
          properties:
            variantId: { type: string }
            price: { type: number }
            effectivePrice: { type: number }
            imageUrl: { type: string }
            colorName: { type: string }
            colorHex: { type: string }
            sizeLabel: { type: string }
            discount:
              $ref: '#/components/schemas/Discount'
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductListItem'
        - type: object
          properties:
            variants:
              type: array
              items: { type: object }
    ProductFacetResponse:
      type: object
      properties:
        categoryId: { type: string }
        categorySlug: { type: string }
        priceRange:
          type: object
          nullable: true
          properties:
            min: { type: number }
            max: { type: number }
        facets:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              label: { type: string }
              type: { type: string, enum: [enum, boolean, text] }
              scope: { type: string, enum: [product, variant], default: variant }
              multiSelect: { type: boolean }
              showOther: { type: boolean }
              options:
                type: array
                items:
                  type: object
                  properties:
                    value: { type: string }
                    label: { type: string }
                    count: { type: number }
              other:
                type: object
                nullable: true
                properties:
                  value: { type: string }
                  label: { type: string }
                  count: { type: number }
    VariantWriteRequest:
      type: object
      properties:
        price: { type: number }
        discount:
          $ref: '#/components/schemas/Discount'
        merchandise: { type: object }
        images:
          type: array
          items: { type: object }
        inventory: { type: object }
    InventoryPatchRequest:
      type: object
      properties:
        availableQty: { type: number }
        reservedQty: { type: number }
        display: { type: object }
        care: { type: object }
        returnPolicy: { type: object }

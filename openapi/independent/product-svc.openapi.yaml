openapi: 3.0.3
info:
  title: sacom product-svc (independent)
  version: 1.1.0
servers:
  - url: http://localhost:4445
tags:
  - name: Health
  - name: Storefront
  - name: Admin Products
  - name: Admin Variants
  - name: Admin Inventory
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: OK
  /products:
    get:
      tags: [Storefront]
      summary: List storefront products
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: facet.color.name
          schema: { type: string }
        - in: query
          name: facet.blouse.type
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: number }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: discountType
          schema: { type: string, enum: [none, percent, flat] }
        - in: query
          name: discountMin
          schema: { type: number }
        - in: query
          name: discountMax
          schema: { type: number }
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
  /products/facets:
    get:
      tags: [Storefront]
      summary: List storefront facet metadata with counts
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        '200':
          description: Facet list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductFacetResponse'
  /products/{slug}:
    parameters:
      - in: path
        name: slug
        required: true
        schema:
          type: string
    get:
      tags: [Storefront]
      summary: Get product by slug
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
  /categories/{slug}/products:
    parameters:
      - in: path
        name: slug
        required: true
        schema:
          type: string
    get:
      tags: [Storefront]
      summary: List products by category slug
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
  /api/admin/products:
    get:
      tags: [Admin Products]
      summary: List admin products
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: facet.color.name
          schema: { type: string }
        - in: query
          name: facet.blouse.type
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: number }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: discountType
          schema: { type: string, enum: [none, percent, flat] }
        - in: query
          name: discountMin
          schema: { type: number }
        - in: query
          name: discountMax
          schema: { type: number }
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminProductListItem'
  /api/admin/products/facets:
    get:
      tags: [Admin Products]
      summary: List admin facet metadata with counts
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        '200':
          description: Facet list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductFacetResponse'
    post:
      tags: [Admin Products]
      summary: Create product
      description: Slug is optional. If missing/blank or colliding, service auto-generates a unique slug with numeric suffixes.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWriteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProductDetail'
  /api/admin/products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      tags: [Admin Products]
      summary: Get product by id
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDocument'
    put:
      tags: [Admin Products]
      summary: Update product
      description: Slug collisions are auto-resolved. If slug is omitted/blank and title changed, slug is regenerated from title.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWriteRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDocument'
    delete:
      tags: [Admin Products]
      summary: Soft-delete product
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Deleted
  /api/admin/products/{id}/publish:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    patch:
      tags: [Admin Products]
      summary: Publish/unpublish product
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isActive:
                  type: boolean
      responses:
        '200':
          description: Updated
  /api/admin/products/{id}/variants:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      tags: [Admin Variants]
      summary: List variants for product
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Variant list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminVariantListItem'
    post:
      tags: [Admin Variants]
      summary: Create variant for product
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VariantWriteRequest'
      responses:
        '201':
          description: Created
  /api/admin/products/{id}/variants/{variantId}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      - in: path
        name: variantId
        required: true
        schema:
          type: string
    patch:
      tags: [Admin Variants]
      summary: Update variant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VariantWriteRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariantDocument'
  /api/admin/products/inventory/list:
    get:
      tags: [Admin Inventory]
      summary: List inventory
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryDocument'
  /api/admin/products/inventory/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    patch:
      tags: [Admin Inventory]
      summary: Update inventory row
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryPatchRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryDocument'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ColorInfo:
      type: object
      properties:
        name: { type: string }
        family: { type: string }
        hex: { type: string, example: '#B22222' }
    CarePolicy:
      type: object
      properties:
        washCare:
          type: array
          items: { type: string }
        ironCare: { type: string }
        bleach: { type: string }
        dryClean: { type: string }
        dryInstructions: { type: string }
    ReturnPolicy:
      type: object
      properties:
        returnable: { type: boolean }
        windowDays: { type: number }
        type:
          type: string
          enum: [none, exchange, refund, exchange_or_refund]
        notes: { type: string }
    ProductShipping:
      type: object
      properties:
        text: { type: string }
    ProductCare:
      type: object
      properties:
        text: { type: string }
    ProductReturnPolicy:
      type: object
      properties:
        text: { type: string }
        returnable: { type: boolean }
        windowDays: { type: number }
    MaterialProfile:
      type: object
      properties:
        fabric: { type: string }
        weave: { type: string }
        workType: { type: string }
        pattern: { type: string }
        borderStyle: { type: string }
        palluStyle: { type: string }
    VariantMerchandise:
      type: object
      properties:
        color:
          $ref: '#/components/schemas/ColorInfo'
        style:
          type: object
          properties:
            occasionTags:
              type: array
              items: { type: string }
            workType: { type: string }
            pattern: { type: string }
      additionalProperties: true
    ProductWriteRequest:
      type: object
      required: [title, categoryId]
      properties:
        title: { type: string }
        slug:
          type: string
          description: Optional. If omitted/blank, service derives from title and auto-resolves collisions using numeric suffixes.
        description: { type: string }
        shortDescription: { type: string }
        categoryId: { type: string }
        tags:
          type: array
          items: { type: string }
        currency: { type: string }
        images:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              alt: { type: string }
              sortOrder: { type: number }
        shipping:
          $ref: '#/components/schemas/ProductShipping'
        care:
          $ref: '#/components/schemas/ProductCare'
        returnPolicy:
          $ref: '#/components/schemas/ProductReturnPolicy'
        details:
          type: object
          additionalProperties: true
        isActive: { type: boolean }
        isFeatured: { type: boolean }
    ProductDocument:
      allOf:
        - $ref: '#/components/schemas/ProductWriteRequest'
        - type: object
          properties:
            _id: { type: string }
            createdAt: { type: string }
            updatedAt: { type: string }
    ColorSummary:
      type: object
      properties:
        colorNames:
          type: array
          items: { type: string }
        swatches:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              hex: { type: string }
        hasMultipleColors: { type: boolean }
    Discount:
      type: object
      properties:
        type: { type: string, enum: [none, percent, flat] }
        value: { type: number }
        label: { type: string }
    ProductFacetResponse:
      type: object
      properties:
        categoryId: { type: string }
        categorySlug: { type: string }
        priceRange:
          type: object
          nullable: true
          properties:
            min: { type: number }
            max: { type: number }
        facets:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              label: { type: string }
              type: { type: string, enum: [enum, boolean] }
              scope: { type: string, enum: [variant], default: variant }
              valueType: { type: string, enum: [string, number, boolean, string_array] }
              multiSelect: { type: boolean }
              showOther: { type: boolean }
              options:
                type: array
                items:
                  type: object
                  properties:
                    value: { type: string }
                    label: { type: string }
                    count: { type: number }
              other:
                type: object
                nullable: true
                properties:
                  value: { type: string }
                  label: { type: string }
                  count: { type: number }
    ProductListItem:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        slug: { type: string }
        shortDescription: { type: string }
        currency: { type: string }
        care:
          $ref: '#/components/schemas/ProductCare'
        returnPolicy:
          $ref: '#/components/schemas/ProductReturnPolicy'
        defaultVariant:
          $ref: '#/components/schemas/DefaultVariant'
        availability: { type: boolean }
        colorSummary:
          $ref: '#/components/schemas/ColorSummary'
        otherVariantColors:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              hex: { type: string }
    VariantDocument:
      type: object
      properties:
        _id: { type: string }
        productId: { type: string }
        price: { type: number }
        mrp: { type: number }
        compareAtPrice: { type: number }
        discount:
          $ref: '#/components/schemas/Discount'
        barcode: { type: string }
        images:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              alt: { type: string }
              sortOrder: { type: number }
        merchandise:
          $ref: '#/components/schemas/VariantMerchandise'
        sizeRows:
          type: array
          items:
            $ref: '#/components/schemas/SizeRowRead'
        isDefault: { type: boolean }
        isActive: { type: boolean }
        sortOrder: { type: number }
        createdAt: { type: string }
        updatedAt: { type: string }
    InventoryDisplay:
      type: object
      properties:
        colorName: { type: string }
        sizeLabel: { type: string }
        materialLabel: { type: string }
    InventoryFulfillment:
      type: object
      properties:
        warehouseCode: { type: string }
        binLocation: { type: string }
        restockEtaDays: { type: number }
    InventoryDocument:
      type: object
      properties:
        _id: { type: string }
        stockKey: { type: string }
        productId: { type: string }
        variantId: { type: string }
        sizeRowId: { type: string }
        trackInventory: { type: boolean }
        availableQty: { type: number }
        reservedQty: { type: number }
        allowBackorder: { type: boolean }
        reorderLevel: { type: number }
        display:
          $ref: '#/components/schemas/InventoryDisplay'
        care:
          $ref: '#/components/schemas/CarePolicy'
        returnPolicy:
          $ref: '#/components/schemas/ReturnPolicy'
        fulfillment:
          $ref: '#/components/schemas/InventoryFulfillment'
        createdAt: { type: string }
        updatedAt: { type: string }
    InventoryPatchRequest:
      type: object
      properties:
        trackInventory: { type: boolean }
        availableQty: { type: number }
        reservedQty: { type: number }
        allowBackorder: { type: boolean }
        reorderLevel: { type: number }
        display:
          $ref: '#/components/schemas/InventoryDisplay'
        care:
          $ref: '#/components/schemas/CarePolicy'
        returnPolicy:
          $ref: '#/components/schemas/ReturnPolicy'
        fulfillment:
          $ref: '#/components/schemas/InventoryFulfillment'
    VariantWriteRequest:
      type: object
      required: [price, merchandise, sizeRows]
      properties:
        price: { type: number }
        mrp: { type: number }
        compareAtPrice: { type: number }
        discount:
          $ref: '#/components/schemas/Discount'
        barcode: { type: string }
        images:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              alt: { type: string }
              sortOrder: { type: number }
        merchandise:
          $ref: '#/components/schemas/VariantMerchandise'
        sizeRows:
          type: array
          description: >
            Per-size rows. size.label must match configured category size facet enum values
            (size/size.label). Missing enum sizes are auto-created with availableQty=0.
            If size facet is missing/empty, only fallback size FREE is accepted.
          items:
            $ref: '#/components/schemas/SizeRowWriteRequest'
        isDefault: { type: boolean }
        isActive: { type: boolean }
        sortOrder: { type: number }
    VariantWithInventory:
      allOf:
        - $ref: '#/components/schemas/VariantDocument'
        - type: object
          properties:
            inventory:
              $ref: '#/components/schemas/InventoryDocument'
            effectiveReturnPolicy:
              $ref: '#/components/schemas/ReturnPolicy'
    ProductDetail:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        slug: { type: string }
        description: { type: string }
        shortDescription: { type: string }
        currency: { type: string }
        images:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              alt: { type: string }
              sortOrder: { type: number }
        shipping:
          $ref: '#/components/schemas/ProductShipping'
        care:
          $ref: '#/components/schemas/ProductCare'
        returnPolicy:
          $ref: '#/components/schemas/ProductReturnPolicy'
        details:
          type: object
          additionalProperties: true
        variants:
          type: array
          items:
            $ref: '#/components/schemas/StorefrontVariantListItem'
        defaultVariant:
          $ref: '#/components/schemas/DefaultVariant'
        availability: { type: boolean }
        colorSummary:
          $ref: '#/components/schemas/ColorSummary'
        otherVariantColors:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              hex: { type: string }
    DefaultVariant:
      type: object
      properties:
        variantId: { type: string }
        isDefault: { type: boolean }
        price: { type: number }
        effectivePrice: { type: number }
        mrp: { type: number }
        compareAtPrice: { type: number }
        discount:
          $ref: '#/components/schemas/Discount'
        imageUrl: { type: string }
        colorName: { type: string }
        colorHex: { type: string }
        sizeLabel: { type: string }
    MinimalInventory:
      type: object
      properties:
        _id: { type: string }
        stockKey: { type: string }
        sizeRowId: { type: string }
        availableQty: { type: number }
        reservedQty: { type: number }
        allowBackorder: { type: boolean }
        reorderLevel: { type: number }
    SizeRowSize:
      type: object
      properties:
        label:
          type: string
          description: Canonical size value (facet enum value, or FREE fallback).
        system: { type: string }
        sortKey: { type: number }
    SizeRowWriteRequest:
      type: object
      properties:
        rowId: { type: string }
        size:
          $ref: '#/components/schemas/SizeRowSize'
        stockKey: { type: string }
        isActive: { type: boolean }
        sortOrder: { type: number }
        inventory:
          $ref: '#/components/schemas/InventoryPatchRequest'
    SizeRowRead:
      type: object
      properties:
        rowId: { type: string }
        size:
          $ref: '#/components/schemas/SizeRowSize'
        stockKey: { type: string }
        isActive: { type: boolean }
        sortOrder: { type: number }
        inventory:
          $ref: '#/components/schemas/MinimalInventory'
        availability: { type: boolean }
        effectiveReturnPolicy:
          $ref: '#/components/schemas/ReturnPolicy'
    StorefrontVariantListItem:
      type: object
      properties:
        _id: { type: string }
        price: { type: number }
        effectivePrice: { type: number }
        isDefault: { type: boolean }
        isActive: { type: boolean }
        images:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              alt: { type: string }
              sortOrder: { type: number }
        merchandise:
          $ref: '#/components/schemas/VariantMerchandise'
        sizeRows:
          type: array
          items:
            $ref: '#/components/schemas/SizeRowRead'
        availability: { type: boolean }
        effectiveReturnPolicy:
          $ref: '#/components/schemas/ReturnPolicy'
    AdminProductListItem:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        slug: { type: string }
        isActive: { type: boolean }
        isFeatured: { type: boolean }
        defaultVariant:
          $ref: '#/components/schemas/DefaultVariant'
        colorSummary:
          $ref: '#/components/schemas/ColorSummary'
        care:
          $ref: '#/components/schemas/ProductCare'
        returnPolicy:
          $ref: '#/components/schemas/ProductReturnPolicy'
    AdminProductDetail:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        slug: { type: string }
        description: { type: string }
        shortDescription: { type: string }
        categoryId: { type: string }
        currency: { type: string }
        tags:
          type: array
          items: { type: string }
        images:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              alt: { type: string }
              sortOrder: { type: number }
        shipping:
          $ref: '#/components/schemas/ProductShipping'
        care:
          $ref: '#/components/schemas/ProductCare'
        returnPolicy:
          $ref: '#/components/schemas/ProductReturnPolicy'
        details:
          type: object
          additionalProperties: true
        isFeatured: { type: boolean }
        isActive: { type: boolean }
    AdminVariantListItem:
      type: object
      properties:
        _id: { type: string }
        productId: { type: string }
        price: { type: number }
        mrp: { type: number }
        compareAtPrice: { type: number }
        discount:
          $ref: '#/components/schemas/Discount'
        images:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              alt: { type: string }
              sortOrder: { type: number }
        merchandise:
          $ref: '#/components/schemas/VariantMerchandise'
        sizeRows:
          type: array
          items:
            $ref: '#/components/schemas/SizeRowRead'
        isDefault: { type: boolean }
        isActive: { type: boolean }
        sortOrder: { type: number }
        effectiveReturnPolicy:
          $ref: '#/components/schemas/ReturnPolicy'
